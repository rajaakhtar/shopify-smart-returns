<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Returns — Admin</title>
  <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f6f6f7; color: #202223; font-size: 14px; }
    .header { background: #fff; border-bottom: 1px solid #e1e3e5; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
    .header h1 { font-size: 18px; font-weight: 600; color: #202223; }
    .header .count { font-size: 13px; color: #6d7175; }
    .container { padding: 24px; max-width: 1100px; margin: 0 auto; }
    .empty { text-align: center; padding: 80px 24px; color: #6d7175; }
    .empty svg { margin-bottom: 16px; opacity: 0.4; }
    .empty p { font-size: 15px; }
    .tabs { display: flex; gap: 0; margin-bottom: 0; border: 1px solid #e1e3e5; border-radius: 8px 8px 0 0; overflow: hidden; background: #fff; }
    .tab { flex: 1; padding: 10px 16px; font-size: 13px; font-weight: 500; background: #f6f6f7; border: none; border-right: 1px solid #e1e3e5; cursor: pointer; color: #6d7175; transition: background 0.15s; white-space: nowrap; }
    .tab:last-child { border-right: none; }
    .tab.active { background: #fff; color: #202223; }
    .tab:hover:not(.active) { background: #f0f0f0; }
    .search-wrap { margin-bottom: 0; }
    .search-input { width: 100%; padding: 9px 14px; border: 1px solid #e1e3e5; border-top: none; border-bottom: none; font-size: 14px; background: #fff; color: #202223; outline: none; display: block; }
    .search-input:focus { background: #fafafa; }
    .card-list { border: 1px solid #e1e3e5; border-top: none; border-radius: 0 0 8px 8px; overflow: hidden; }
    .complete-btn { font-size: 13px; font-weight: 500; padding: 6px 14px; border-radius: 6px; border: 1px solid #1a6b1a; background: #f3fbf3; color: #1a6b1a; cursor: pointer; white-space: nowrap; transition: background 0.15s; }
    .complete-btn:hover { background: #e0f5e0; }
    .cancel-btn { font-size: 13px; font-weight: 500; padding: 6px 14px; border-radius: 6px; border: 1px solid #c4cdd5; background: #fff; color: #b91c1c; cursor: pointer; white-space: nowrap; transition: background 0.15s; }
    .cancel-btn:hover { background: #fff5f5; }
    .no-results { padding: 28px; text-align: center; color: #6d7175; font-size: 14px; border: 1px solid #e1e3e5; border-top: none; border-radius: 0 0 8px 8px; background: #fff; }
    .card { background: #fff; border-bottom: 1px solid #e1e3e5; overflow: hidden; }
    .card:last-child { border-bottom: none; }
    .card-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; cursor: pointer; user-select: none; }
    .card-header:hover { background: #fafafa; }
    .card-meta { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
    .order-num { font-weight: 600; font-size: 15px; }
    .customer { color: #202223; }
    .date { color: #6d7175; font-size: 13px; }
    .badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 9px; border-radius: 20px; font-size: 12px; font-weight: 500; }
    .badge-sent { background: #d3f0d1; color: #1a6b1a; }
    .badge-failed { background: #ffd2d2; color: #b91c1c; }
    .chevron { transition: transform 0.2s; color: #6d7175; flex-shrink: 0; margin-left: 12px; }
    .chevron.open { transform: rotate(180deg); }
    .card-body { display: none; padding: 0 18px 18px; border-top: 1px solid #f1f1f1; }
    .card-body.open { display: block; }
    .section { margin-top: 16px; }
    .section-title { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: #6d7175; margin-bottom: 8px; }
    .refund-pref { font-size: 14px; color: #202223; background: #f6f6f7; padding: 8px 12px; border-radius: 6px; }
    .items-table { width: 100%; border-collapse: collapse; border: 1px solid #e1e3e5; border-radius: 6px; overflow: hidden; font-size: 13px; }
    .items-table th { background: #f6f6f7; padding: 8px 12px; text-align: left; font-weight: 600; color: #6d7175; border-bottom: 1px solid #e1e3e5; }
    .items-table td { padding: 10px 12px; border-bottom: 1px solid #f1f1f1; color: #202223; vertical-align: top; }
    .items-table tr:last-child td { border-bottom: none; }
    .item-comment { font-size: 12px; color: #6d7175; font-style: italic; margin-top: 3px; }
    .confirmations { display: flex; flex-direction: column; gap: 4px; }
    .confirm-row { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #3d7a3d; }
    .confirm-row svg { flex-shrink: 0; }
    .divider { height: 1px; background: #f1f1f1; margin: 16px 0 0; }
    .card-footer { padding: 12px 18px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
    .footer-meta { display: flex; gap: 16px; flex-wrap: wrap; }
    .meta-item { font-size: 12px; color: #6d7175; }
    .meta-item span { color: #202223; font-weight: 500; }
    .resend-btn { font-size: 13px; font-weight: 500; padding: 6px 14px; border-radius: 6px; border: 1px solid #c4cdd5; background: #fff; color: #202223; cursor: pointer; white-space: nowrap; transition: background 0.15s; }
    .resend-btn:hover:not(:disabled) { background: #f6f6f7; }
    .resend-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .resend-btn.success { border-color: #1a6b1a; color: #1a6b1a; background: #f3fbf3; }
    .resend-btn.error { border-color: #b91c1c; color: #b91c1c; background: #fff8f8; }
    .returns-rate { font-size: 13px; color: #202223; display: flex; align-items: center; gap: 8px; }
    .returns-rate-stat { font-weight: 600; }
    .returns-rate-stat.high { color: #b91c1c; }
    .returns-rate-stat.medium { color: #d97706; }
    .returns-rate-stat.low { color: #1a6b1a; }
    .load-rate-btn { font-size: 12px; padding: 4px 10px; border-radius: 5px; border: 1px solid #c4cdd5; background: #fff; color: #5c6bc0; cursor: pointer; transition: background 0.15s; }
    .load-rate-btn:hover:not(:disabled) { background: #f0f0ff; }
    .load-rate-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .action-select { font-size: 13px; padding: 6px 10px; border-radius: 6px; border: 1px solid #c4cdd5; background: #fff; color: #202223; cursor: pointer; }
    .action-go-btn { font-size: 13px; font-weight: 500; padding: 6px 16px; border-radius: 6px; border: 1px solid #c4cdd5; background: #fff; color: #202223; cursor: pointer; transition: background 0.15s; }
    .action-go-btn:hover { background: #f6f6f7; }
    .process-panel { margin: 0 18px 16px; padding: 16px; background: #f6f6f7; border-radius: 8px; border: 1px solid #e1e3e5; }
    .process-panel h4 { font-size: 14px; font-weight: 600; color: #202223; margin: 0 0 12px; }
    .process-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 14px; }
    .process-table th { text-align: left; font-weight: 600; color: #6d7175; padding: 6px 8px; border-bottom: 1px solid #e1e3e5; }
    .process-table td { padding: 8px; border-bottom: 1px solid #f1f1f1; color: #202223; vertical-align: middle; }
    .process-table tr:last-child td { border-bottom: none; }
    .process-summary { font-size: 13px; color: #202223; margin-bottom: 12px; }
    .process-summary strong { font-weight: 600; }
    .process-deduction-warn { font-size: 12px; color: #d97706; background: #fffbeb; border: 1px solid #fde68a; border-radius: 6px; padding: 8px 10px; margin-bottom: 12px; }
    .process-discrepancy { font-size: 13px; color: #b91c1c; background: #fff8f8; border: 1px solid #fecaca; border-radius: 6px; padding: 10px 12px; margin-bottom: 12px; }
    .process-success { font-size: 13px; color: #1a6b1a; background: #f3fbf3; border: 1px solid #bbf7d0; border-radius: 6px; padding: 10px 12px; }
    .process-confirm-btn { font-size: 13px; font-weight: 600; padding: 8px 20px; border-radius: 6px; border: none; background: #4a1e5d; color: #fff; cursor: pointer; transition: background 0.15s; }
    .process-confirm-btn:hover:not(:disabled) { background: #3a1649; }
    .process-confirm-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .order-num { color: #202223; font-weight: 600; font-size: 15px; text-decoration: none; }
    .order-num:hover { text-decoration: underline; }
    .template-section { background: #fff; border: 1px solid #e1e3e5; border-radius: 8px; margin-bottom: 24px; overflow: hidden; }
    .template-section-header { padding: 16px 20px; border-bottom: 1px solid #e1e3e5; display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
    .template-section-header h2 { font-size: 15px; font-weight: 600; color: #202223; margin-bottom: 3px; }
    .template-section-header p { font-size: 13px; color: #6d7175; margin: 0; }
    .save-btn { font-size: 13px; font-weight: 500; padding: 7px 16px; border-radius: 6px; border: none; background: #4a1e5d; color: #fff; cursor: pointer; white-space: nowrap; flex-shrink: 0; transition: background 0.15s; }
    .save-btn:hover:not(:disabled) { background: #3a1649; }
    .save-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .template-editor-wrap { padding: 16px 20px 0; }
    .template-status { padding: 10px 20px 14px; font-size: 13px; min-height: 36px; }
    .template-status.success { color: #1a6b1a; }
    .template-status.error { color: #b91c1c; }
    /* Override Quill toolbar border radius */
    .ql-toolbar.ql-snow { border-radius: 6px 6px 0 0; border-color: #e1e3e5; }
    .ql-container.ql-snow { border-radius: 0 0 6px 6px; border-color: #e1e3e5; min-height: 180px; font-size: 14px; }
    .html-source { display: none; width: 100%; min-height: 180px; box-sizing: border-box; font-family: 'Courier New', monospace; font-size: 12px; line-height: 1.5; padding: 12px; border: 1px solid #e1e3e5; border-radius: 6px; color: #222; resize: vertical; outline: none; }
    .source-btn { font-size: 12px; font-weight: 500; padding: 5px 11px; border-radius: 6px; border: 1px solid #c4cdd5; background: #fff; color: #444; cursor: pointer; white-space: nowrap; transition: background 0.15s; }
    .source-btn:hover { background: #f6f6f7; }
    .source-btn.active { background: #f0e8f5; border-color: #4a1e5d; color: #4a1e5d; }
    @media (max-width: 600px) {
      .container { padding: 12px; }
      .card-meta { gap: 8px; }
      .items-table { font-size: 12px; }
    }
  </style>
</head>
<body>

<div class="header">
  <h1>Smart Returns</h1>
  <div style="display:flex;align-items:center;gap:12px;">
    <span class="count" id="submission-count"></span>
    <button class="save-btn" id="toggle-template-btn" onclick="toggleTemplate()" style="font-size:12px;padding:5px 12px;">✎ Auto-Reply</button>
  </div>
</div>

<div class="container">

  <!-- Auto-Reply Template (hidden by default) -->
  <div class="template-section" id="template-section" style="display:none;">
    <div class="template-section-header">
      <div>
        <h2>Auto-Reply Template</h2>
        <p>This message is sent automatically to the customer when they submit a return request.</p>
      </div>
      <div style="display:flex;gap:8px;flex-shrink:0;">
        <button class="source-btn" id="source-btn" onclick="toggleSource()">&lt;/&gt; HTML</button>
        <button class="save-btn" id="save-template-btn" onclick="saveTemplate()">Save Template</button>
      </div>
    </div>
    <div class="template-editor-wrap">
      <div id="quill-editor"></div>
      <textarea id="html-source" class="html-source" spellcheck="false"></textarea>
    </div>
    <div class="template-status" id="template-status"></div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" id="tab-open" onclick="switchTab('open')">Open Requests</button>
    <button class="tab" id="tab-processed" onclick="switchTab('processed')">Processed</button>
    <button class="tab" id="tab-cancelled" onclick="switchTab('cancelled')">Cancelled</button>
  </div>

  <!-- Search -->
  <div class="search-wrap">
    <input class="search-input" id="search-input" type="text" placeholder="Search by order number, name or email…" oninput="filterSubmissions(this.value)">
  </div>

  <!-- Return Submissions -->
  <div id="app"></div>

</div>

<script>
const submissions = __SUBMISSIONS_JSON__;
const adminToken = __ADMIN_TOKEN__;
const baseUrl = __BASE_URL__;
const shopDomain = __SHOP_DOMAIN__;
const savedTemplateHtml = __CUSTOMER_TEMPLATE_HTML__;

const app = document.getElementById('app');
const countEl = document.getElementById('submission-count');
let currentTab = 'open';

function formatDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleString('en-GB', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
}

function esc(str) {
  if (str === undefined || str === null) return '—';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tab-open').classList.toggle('active', tab === 'open');
  document.getElementById('tab-processed').classList.toggle('active', tab === 'processed');
  document.getElementById('tab-cancelled').classList.toggle('active', tab === 'cancelled');
  document.getElementById('search-input').value = '';
  renderSubmissions();
}

function updateTabCounts() {
  const openCount = submissions.filter(s => s.status !== 'processed' && s.status !== 'cancelled').length;
  const processedCount = submissions.filter(s => s.status === 'processed').length;
  const cancelledCount = submissions.filter(s => s.status === 'cancelled').length;
  document.getElementById('tab-open').textContent = `Open Requests (${openCount})`;
  document.getElementById('tab-processed').textContent = `Processed (${processedCount})`;
  document.getElementById('tab-cancelled').textContent = `Cancelled (${cancelledCount})`;
  countEl.textContent = openCount === 1 ? '1 open' : `${openCount} open`;
}

function renderSubmissions() {
  updateTabCounts();
  const filtered = submissions.filter(s => {
    if (currentTab === 'processed') return s.status === 'processed';
    if (currentTab === 'cancelled') return s.status === 'cancelled';
    return s.status !== 'processed' && s.status !== 'cancelled';
  });

  if (filtered.length === 0) {
    app.innerHTML = `
      <div class="empty" style="border:1px solid #e1e3e5;border-top:none;border-radius:0 0 8px 8px;background:#fff;">
        <svg width="48" height="48" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
        </svg>
        <p>${currentTab === 'processed' ? 'No processed submissions yet' : currentTab === 'cancelled' ? 'No cancelled submissions' : 'No open return requests'}</p>
      </div>`;
    return;
  }

  app.innerHTML = '<div class="card-list">' + filtered.map(s => {
    const statusClass = s.emailStatus === 'sent' ? 'badge-sent' : 'badge-failed';
    const statusLabel = s.emailStatus === 'sent' ? '✓ Email sent' : '✗ Email failed';
    const itemCount = s.items ? s.items.length : 0;

    const itemRows = (s.items || []).map(item => `
      <tr>
        <td>
          <strong>${esc(item.title)}</strong>
          ${item.variantTitle ? `<br><span style="color:#6d7175;font-size:12px;">${esc(item.variantTitle)}</span>` : ''}
          ${item.sku ? `<br><span style="color:#8c9196;font-size:11px;">SKU: ${esc(item.sku)}</span>` : ''}
        </td>
        <td>${esc(String(item.quantityToReturn))} of ${esc(String(item.quantityPurchased))}</td>
        <td>£${esc(item.price)}</td>
        <td>
          ${esc(item.reason)}${item.otherReason ? ` — ${esc(item.otherReason)}` : ''}
          ${item.comments ? `<div class="item-comment">${esc(item.comments)}</div>` : ''}
        </td>
      </tr>`).join('');

    const searchText = [s.orderNumber, s.customerName, s.customerEmail].join(' ').toLowerCase();
    return `
    <div class="card" data-search="${esc(searchText)}">
      <div class="card-header" onclick="toggle('${s.id}')">
        <div class="card-meta">
          <a class="order-num" href="${s.shopifyOrderId ? `https://admin.shopify.com/store/${shopDomain.replace('.myshopify.com','')}/orders/${s.shopifyOrderId}` : `https://${shopDomain}/admin/orders?query=${encodeURIComponent(s.orderNumber.replace('#',''))}`}" target="_blank" onclick="event.stopPropagation()">${esc(s.orderNumber)}</a>
          <span class="customer">${esc(s.customerName)}</span>
          <span class="date">${formatDate(s.submittedAt)}</span>
          <span class="badge ${statusClass}">${statusLabel}</span>
        </div>
        <svg class="chevron" id="chevron-${s.id}" width="16" height="16" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd"/>
        </svg>
      </div>
      <div class="card-body" id="body-${s.id}">

        <div class="section">
          <div class="section-title">Refund Preference</div>
          <div class="refund-pref">${esc(s.refundPreference)}</div>
          ${s.exchangeDetails ? `<div style="margin-top:8px;font-size:13px;color:#202223;background:#f0e8f5;padding:8px 12px;border-radius:6px;white-space:pre-wrap;"><strong>Exchange details:</strong><br>${esc(s.exchangeDetails)}</div>` : ''}
        </div>

        <div class="section">
          <div class="section-title">${itemCount} Item${itemCount !== 1 ? 's' : ''} to Return</div>
          <table class="items-table">
            <thead><tr>
              <th>Product</th><th>Qty</th><th>Price</th><th>Reason</th>
            </tr></thead>
            <tbody>${itemRows}</tbody>
          </table>
        </div>

        <div class="section">
          <div class="section-title">Policy Confirmations</div>
          <div class="confirmations">
            <div class="confirm-row">
              <svg width="14" height="14" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/></svg>
              Tags &amp; ribbons still attached: <strong>${esc(s.tagsAttached)}</strong>
            </div>
            <div class="confirm-row">
              <svg width="14" height="14" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/></svg>
              Read returns policy &nbsp;·&nbsp; Within 14 days &nbsp;·&nbsp; Responsible for postage &nbsp;·&nbsp; Understands 15% deduction &nbsp;·&nbsp; Delivery charges non-refundable
            </div>
          </div>
        </div>

        <div class="divider"></div>

        <div class="card-footer">
          <div class="footer-meta">
            <div class="meta-item">Customer email: <span>${esc(s.customerEmail)}</span></div>
            <div class="meta-item">Order placed: <span>${esc(s.orderDate)}</span></div>
            <div class="meta-item">Returns rate: ${s.returnsRate
              ? `<span id="rate-${s.id}" class="returns-rate-stat ${s.returnsRate.rate >= 40 ? 'high' : s.returnsRate.rate >= 20 ? 'medium' : 'low'}">${s.returnsRate.rate}% (${s.returnsRate.totalReturned} of ${s.returnsRate.totalOrdered} items)</span>${currentTab === 'open' ? ` <button class="load-rate-btn" id="rate-btn-${s.id}" onclick="loadReturnsRate('${s.id}')" title="Refresh returns rate">↻</button>` : ''}`
              : `<button class="load-rate-btn" id="rate-btn-${s.id}" onclick="loadReturnsRate('${s.id}')">Load Returns Rate</button>`
            }</div>
          </div>
          <div style="display:flex;gap:8px;align-items:center;">
            <select class="action-select" id="action-${s.id}">
              <option value="">Select action…</option>
              ${currentTab === 'open' ? `
              <option value="process">▶ Start Processing Return</option>
              <option value="complete">✓ Move to Processed</option>
              <option value="cancel">✕ Cancel Request</option>` : ''}
              <option value="resend">↺ Re-send Admin Email</option>
              <option value="resend-customer">↺ Re-send Customer Email</option>
            </select>
            <button class="action-go-btn" onclick="performAction('${s.id}')">Go</button>
          </div>
        </div>
        <div id="process-panel-${s.id}" class="process-panel" style="display:none;"></div>
      </div>
    </div>`;
  }).join('') + '</div>';
}

function toggle(id) {
  document.getElementById('body-' + id).classList.toggle('open');
  document.getElementById('chevron-' + id).classList.toggle('open');
}

function filterSubmissions(term) {
  const q = term.trim().toLowerCase();
  const cards = document.querySelectorAll('#app .card');
  let visible = 0;
  cards.forEach(card => {
    const match = !q || card.dataset.search.includes(q);
    card.style.display = match ? '' : 'none';
    if (match) visible++;
  });
  const noResultsEl = document.getElementById('no-results');
  if (noResultsEl) noResultsEl.style.display = (q && visible === 0) ? 'block' : 'none';
}

function performAction(submissionId) {
  const select = document.getElementById(`action-${submissionId}`);
  const action = select.value;
  if (!action) return;
  select.value = '';
  if (action === 'process') startProcessingReturn(submissionId);
  else if (action === 'complete') markProcessed(submissionId);
  else if (action === 'cancel') cancelSubmission(submissionId);
  else if (action === 'resend') resend(submissionId);
  else if (action === 'resend-customer') resendCustomer(submissionId);
}

async function startProcessingReturn(submissionId) {
  const panel = document.getElementById(`process-panel-${submissionId}`);
  panel.style.display = 'block';
  panel.innerHTML = '<p style="font-size:13px;color:#6d7175;">Loading refund details…</p>';

  // Ensure accordion is open
  const body = document.getElementById(`body-${submissionId}`);
  if (body && !body.classList.contains('open')) {
    body.classList.add('open');
    const chevron = document.getElementById(`chevron-${submissionId}`);
    if (chevron) chevron.classList.add('open');
  }

  try {
    const resp = await fetch(baseUrl + '/admin-calculate-refund', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ submissionId, token: adminToken }),
    });
    const data = await resp.json();

    if (!data.success) {
      panel.innerHTML = `<div class="process-discrepancy">⚠️ ${esc(data.message || 'Failed to load refund details.')}</div>`;
      return;
    }

    if (data.alreadyProcessed) {
      const sub = submissions.find(s => String(s.id) === String(submissionId));
      const orderLink = sub?.shopifyOrderId ? getOrderLink(sub.shopifyOrderId, sub.orderNumber) : '';
      panel.innerHTML = `<div class="process-discrepancy">⚠️ All items on this order appear to have already been refunded in Shopify. Please verify manually. ${orderLink ? `<a href="${orderLink}" target="_blank" style="color:#b91c1c;">View order ↗</a>` : ''}</div>`;
      return;
    }

    if (data.discrepancy) {
      const sub = submissions.find(s => String(s.id) === String(submissionId));
      const orderLink = sub?.shopifyOrderId ? getOrderLink(sub.shopifyOrderId, sub.orderNumber) : '';
      panel.innerHTML = `
        <div class="process-discrepancy">
          <strong>⚠️ Discrepancy detected — refund manually</strong><br>
          ${data.discrepancyDetails.map(d => `<span style="display:block;margin-top:4px;">• ${esc(d)}</span>`).join('')}
          ${orderLink ? `<div style="margin-top:10px;"><a href="${orderLink}" target="_blank" style="color:#b91c1c;font-weight:600;">Open order in Shopify ↗</a></div>` : ''}
          <div style="margin-top:10px;font-size:12px;color:#6d7175;">Use <strong>Move to Processed</strong> once you have resolved this manually.</div>
        </div>`;
      return;
    }

    // Build processing panel
    const isGiftCard = (data.refundPreference || '').toLowerCase().includes('store credit') ||
                       (data.refundPreference || '').toLowerCase().includes('exchange');

    const itemRows = (data.items || []).map((item, idx) => `
      <tr>
        <td>${esc(item.title)}${item.variantTitle ? ` <span style="color:#6d7175;">(${esc(item.variantTitle)})</span>` : ''}<br><span style="font-size:11px;color:#6d7175;">${esc(item.sku || '')}</span></td>
        <td style="text-align:center;">${item.quantityToReturn}</td>
        <td style="text-align:right;">£${item.calculatedAmount.toFixed(2)}</td>
        <td style="text-align:center;"><input type="checkbox" id="restock-${submissionId}-${idx}" checked></td>
      </tr>`).join('');

    // Delivery cost row
    const shippingPaid = parseFloat(data.shippingPaid || 0);
    const deliveryRow = `
      <tr style="border-top: 2px solid #e1e3e5;">
        <td style="color:#6d7175;font-style:italic;">Delivery cost</td>
        <td style="text-align:center;">—</td>
        <td style="text-align:right;">${data.hasFreeDelivery ? '<span style="color:#6d7175;">Free</span>' : `£${shippingPaid.toFixed(2)}`}</td>
        <td style="text-align:center;"><input type="checkbox" id="refund-shipping-${submissionId}"${data.hasFreeDelivery ? ' disabled' : ''}></td>
      </tr>`;

    // Other items on the order (not being returned)
    const otherItemsSection = (data.otherItems || []).length > 0 ? `
      <div style="margin-top:14px;margin-bottom:4px;font-size:12px;font-weight:600;color:#6d7175;text-transform:uppercase;letter-spacing:0.04em;">Other items on this order (not returned)</div>
      <table class="process-table" style="opacity:0.6;">
        <thead><tr><th>Item</th><th style="text-align:center;">Qty</th><th style="text-align:right;">Price</th><th></th></tr></thead>
        <tbody>${(data.otherItems || []).map(item => `
          <tr>
            <td>${esc(item.title)}${item.variantTitle ? ` <span style="color:#6d7175;">(${esc(item.variantTitle)})</span>` : ''}<br><span style="font-size:11px;color:#6d7175;">${esc(item.sku || '')}</span></td>
            <td style="text-align:center;">${item.quantity}</td>
            <td style="text-align:right;">£${parseFloat(item.price).toFixed(2)}</td>
            <td></td>
          </tr>`).join('')}
        </tbody>
      </table>` : '';

    const deductionWarning = data.applyDeliveryDeduction
      ? `<div class="process-deduction-warn">⚠️ £2.99 delivery charge will be deducted — remaining order value (£${data.remainingSubtotal.toFixed(2)}) falls below the £70 free delivery threshold.</div>`
      : '';

    const isExchange = (data.refundPreference || '').toLowerCase().includes('exchange');
    const refundMethodLabel = isExchange ? 'Store credit <span style="color:#6d7175;font-weight:400;">(Customer asked for an exchange)</span>' : 'Store credit';
    const refundLabel = isGiftCard
      ? `<div class="process-summary">Refund method: <strong>${refundMethodLabel}</strong><br>A gift card for <strong>£${parseFloat(data.finalRefundAmount).toFixed(2)}</strong> will be created and Shopify will notify the customer.</div>`
      : `<div class="process-summary">Refund method: <strong>Original payment</strong><br>Total refund: <strong>£${parseFloat(data.finalRefundAmount).toFixed(2)}</strong>${data.applyDeliveryDeduction ? ' <span style="color:#d97706;">(after £2.99 delivery deduction)</span>' : ''}</div>`;

    window['calcData_' + submissionId] = data;

    panel.innerHTML = `
      <h4>Process Return</h4>
      <table class="process-table">
        <thead><tr><th>Item</th><th style="text-align:center;">Qty</th><th style="text-align:right;">Amount</th><th style="text-align:center;">Restock</th></tr></thead>
        <tbody>${itemRows}${deliveryRow}</tbody>
      </table>
      ${otherItemsSection}
      ${deductionWarning}
      ${refundLabel}
      <button class="process-confirm-btn" id="confirm-btn-${submissionId}" onclick="confirmRefund('${submissionId}')">Confirm &amp; Process</button>`;

  } catch (err) {
    panel.innerHTML = `<div class="process-discrepancy">⚠️ Error loading refund details. Please try again.</div>`;
  }
}

async function confirmRefund(submissionId) {
  const calcData = window['calcData_' + submissionId];
  const btn = document.getElementById(`confirm-btn-${submissionId}`);
  btn.disabled = true;
  btn.textContent = 'Processing…';

  // Collect restock checkbox states (index-matched to calcData.items)
  const restockChoices = (calcData.items || []).map((_, idx) => {
    const cb = document.getElementById(`restock-${submissionId}-${idx}`);
    return cb ? cb.checked : true;
  });

  const refundShippingCb = document.getElementById(`refund-shipping-${submissionId}`);
  const refundShipping = refundShippingCb ? refundShippingCb.checked : false;

  try {
    const resp = await fetch(baseUrl + '/admin-process-refund', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        token: adminToken,
        submissionId,
        restockChoices,
        applyDeliveryDeduction: calcData.applyDeliveryDeduction,
        finalRefundAmount: calcData.finalRefundAmount,
        originalTransactionId: calcData.originalTransactionId,
        originalGateway: calcData.originalGateway,
        refundLineItems: calcData.refundLineItems,
        refundShipping,
        shippingAmount: calcData.shippingPaid,
      }),
    });
    const data = await resp.json();
    const panel = document.getElementById(`process-panel-${submissionId}`);

    if (!data.success) {
      btn.disabled = false;
      btn.textContent = 'Confirm & Process';
      panel.insertAdjacentHTML('beforeend', `<div class="process-discrepancy" style="margin-top:10px;">⚠️ ${esc(data.message || 'Refund failed.')}</div>`);
      return;
    }

    const successMsg = data.isGiftCard
      ? `✓ Gift card issued successfully${data.giftCardCode ? ` (${esc(data.giftCardCode)})` : ''}. Shopify has notified the customer.`
      : '✓ Refund processed successfully. Order note written.';

    // Update local record and re-render (moves card to Processed tab)
    const sub = submissions.find(s => String(s.id) === String(submissionId));
    if (sub) {
      sub.status = 'processed';
      sub.refundProcessed = true;
      sub.refundMethod = data.isGiftCard ? 'gift_card' : 'original_payment';
    }
    renderSubmissions();

  } catch (err) {
    btn.disabled = false;
    btn.textContent = 'Confirm & Process';
  }
}

function getOrderLink(shopifyOrderId, orderNumber) {
  const storeDomain = typeof shopDomain !== 'undefined' ? shopDomain : '';
  const handle = storeDomain.replace('.myshopify.com', '');
  return handle
    ? `https://admin.shopify.com/store/${handle}/orders/${shopifyOrderId}`
    : '';
}

async function cancelSubmission(submissionId) {
  try {
    const resp = await fetch(baseUrl + '/admin-resend', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'cancel', submissionId, token: adminToken }),
    });
    const data = await resp.json();
    if (data.success) {
      const sub = submissions.find(s => String(s.id) === String(submissionId));
      if (sub) sub.status = 'cancelled';
      renderSubmissions();
    }
  } catch {}
}

async function markProcessed(submissionId) {
  try {
    const resp = await fetch(baseUrl + '/admin-resend', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'mark-processed', submissionId, token: adminToken }),
    });
    const data = await resp.json();
    if (data.success) {
      const sub = submissions.find(s => String(s.id) === String(submissionId));
      if (sub) sub.status = 'processed';
      renderSubmissions();
    }
  } catch {}
}

async function resend(submissionId) {
  const btn = document.getElementById('resend-' + submissionId);
  btn.disabled = true;
  btn.textContent = 'Sending…';
  btn.className = 'resend-btn';
  try {
    const resp = await fetch(baseUrl + '/admin-resend', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ submissionId, token: adminToken }),
    });
    const data = await resp.json();
    if (data.success) {
      btn.textContent = '✓ Sent';
      btn.className = 'resend-btn success';
      setTimeout(() => { btn.disabled = false; btn.textContent = '↺ Re-send Admin Email'; btn.className = 'resend-btn'; }, 4000);
    } else {
      btn.textContent = '✗ Failed — ' + (data.message || 'Try again');
      btn.className = 'resend-btn error';
      btn.disabled = false;
    }
  } catch {
    btn.textContent = '✗ Network error';
    btn.className = 'resend-btn error';
    btn.disabled = false;
  }
}

async function resendCustomer(submissionId) {
  try {
    const resp = await fetch(baseUrl + '/admin-resend', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ submissionId, token: adminToken, action: 'resend-customer' }),
    });
    const data = await resp.json();
    if (data.success) {
      alert('Customer email re-sent successfully.');
    } else {
      alert('Failed to re-send customer email: ' + (data.message || 'Unknown error'));
    }
  } catch {
    alert('Network error — could not re-send customer email.');
  }
}

renderSubmissions();
</script>
<script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
<script>
const quill = new Quill('#quill-editor', {
  theme: 'snow',
  placeholder: 'Write your customer auto-reply message here…',
  modules: {
    toolbar: [
      ['bold', 'italic', 'underline'],
      [{ 'list': 'ordered' }, { 'list': 'bullet' }],
      [{ 'header': [1, 2, 3, false] }],
      ['link'],
      ['clean'],
    ],
  },
});

// Load saved template into Quill
if (savedTemplateHtml) {
  quill.clipboard.dangerouslyPasteHTML(savedTemplateHtml);
}

let sourceMode = false;

function toggleSource() {
  const editorEl = document.getElementById('quill-editor');
  const sourceEl = document.getElementById('html-source');
  const btn = document.getElementById('source-btn');
  sourceMode = !sourceMode;
  if (sourceMode) {
    sourceEl.value = quillToEmailHtml(quill.root.innerHTML);
    editorEl.style.display = 'none';
    sourceEl.style.display = 'block';
    btn.classList.add('active');
    btn.textContent = '✎ Visual';
  } else {
    quill.clipboard.dangerouslyPasteHTML(sourceEl.value);
    sourceEl.style.display = 'none';
    editorEl.style.display = 'block';
    btn.classList.remove('active');
    btn.textContent = '</> HTML';
  }
}

function getEditorHtml() {
  if (sourceMode) {
    return document.getElementById('html-source').value;
  }
  return quill.root.innerHTML;
}

function toggleTemplate() {
  const section = document.getElementById('template-section');
  const btn = document.getElementById('toggle-template-btn');
  const isHidden = section.style.display === 'none';
  section.style.display = isHidden ? 'block' : 'none';
  btn.textContent = isHidden ? '✕ Hide Auto-Reply' : '✎ Auto-Reply';
}

function quillToEmailHtml(html) {
  // 1. Blank lines (<p><br></p>) → placeholder to avoid double-counting
  let r = html.replace(/<p[^>]*>\s*<br\s*\/?>\s*<\/p>/gi, '[[BR]]');
  // 2. Strip opening <p> tags
  r = r.replace(/<p[^>]*>/gi, '');
  // 3. Closing </p> → <br>
  r = r.replace(/<\/p>/gi, '<br>');
  // 4. Restore blank lines as <br>
  r = r.replace(/\[\[BR\]\]/g, '<br>');
  // 5. Cap consecutive <br> at 2
  r = r.replace(/(<br\s*\/?>){3,}/gi, '<br><br>');
  // 6. Strip leading/trailing <br>
  r = r.replace(/^(<br\s*\/?>)+/i, '').replace(/(<br\s*\/?>)+$/i, '');
  return r;
}

async function saveTemplate() {
  const btn = document.getElementById('save-template-btn');
  const statusEl = document.getElementById('template-status');
  btn.disabled = true;
  btn.textContent = 'Saving…';
  statusEl.textContent = '';
  statusEl.className = 'template-status';

  try {
    const resp = await fetch(baseUrl + '/admin-resend', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        action: 'save-template',
        html: btoa(unescape(encodeURIComponent(quillToEmailHtml(getEditorHtml())))),
        token: adminToken,
      }),
    });
    const data = await resp.json();
    if (data.success) {
      statusEl.textContent = '✓ Template saved successfully.';
      statusEl.className = 'template-status success';
    } else {
      statusEl.textContent = '✗ ' + (data.message || 'Save failed.');
      statusEl.className = 'template-status error';
    }
  } catch {
    statusEl.textContent = '✗ Network error — could not save template.';
    statusEl.className = 'template-status error';
  }

  btn.disabled = false;
  btn.textContent = 'Save Template';
}

async function loadReturnsRate(submissionId) {
  const btn = document.getElementById(`rate-btn-${submissionId}`);
  const existingStat = document.getElementById(`rate-${submissionId}`);
  const isRefresh = !!existingStat;

  btn.disabled = true;
  btn.textContent = '…';

  try {
    const resp = await fetch(baseUrl + '/admin-returns-rate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ submissionId, token: adminToken }),
    });
    const data = await resp.json();
    if (data.success) {
      const rateClass = data.rate >= 40 ? 'high' : data.rate >= 20 ? 'medium' : 'low';
      const text = `${data.rate}% (${data.totalReturned} of ${data.totalOrdered} items)`;
      if (isRefresh) {
        existingStat.className = `returns-rate-stat ${rateClass}`;
        existingStat.textContent = text;
        btn.textContent = '↻';
        btn.disabled = false;
      } else {
        const span = document.createElement('span');
        span.id = `rate-${submissionId}`;
        span.className = `returns-rate-stat ${rateClass}`;
        span.textContent = text;
        btn.replaceWith(span);
      }
    } else {
      btn.textContent = isRefresh ? '↻' : 'Load Returns Rate';
      btn.disabled = false;
    }
  } catch {
    btn.textContent = isRefresh ? '↻' : 'Load Returns Rate';
    btn.disabled = false;
  }
}
</script>
